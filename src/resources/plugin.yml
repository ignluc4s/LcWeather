name: LCWeather
version: 1.0.0
main: com.lcweather.LCWeather
api-version: '1.21'
description: A custom weather control plugin for Spigot 1.21
author: ignLucas

commands:
  setweather:
    description: Sets the weather to clear, rain, or thunder
    usage: /setweather <clear/rain/thunder>
    permission: lcweather.setweather
    aliases: [sw]
  weatherlock:
    description: Locks or unlocks the current weather
    usage: /weatherlock <true/false>
    permission: lcweather.weatherlock
    aliases: [wl]
  lcweather:
    description: Main command for LCWeather plugin
    usage: /lcweather <reload>
    permission: lcweather.admin
    aliases: [lcw]

permissions:
  lcweather.setweather:
    description: Allows setting the weather
    default: op
  lcweather.weatherlock:
    description: Allows locking/unlocking the weather
    default: op
  lcweather.admin:
    description: Allows access to all LCWeather admin commands
    default: op
    children:
      lcweather.setweather: true
      lcweather.weatherlock: true
