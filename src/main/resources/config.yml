# LCWeather Configuration File
# A custom weather control plugin for Minecraft 1.21

# ============================================
# Timed Weather Change Settings
# ============================================
timed-weather-change:
  # Enable or disable automatic weather changes
  enabled: false
  
  # Interval between weather changes (in minutes)
  interval: 15
  
  # Weather types to cycle through (options: CLEAR, RAIN, THUNDER)
  # The plugin will cycle through these in order
  cycle:
    - CLEAR
    - RAIN

# ============================================
# Weather Duration Settings (in minutes)
# ============================================
# How long each weather type should last when manually set
# Set to -1 for infinite duration (until changed manually)
weather-durations:
  clear: 30
  rain: 20
  thunder: 10

# ============================================
# Message Settings
# ============================================
messages:
  # Prefix for all plugin messages
  prefix: "&8[&bLCWeather&8] &r"
  
  # Weather change messages (use {weather} for weather type)
  weather-changed: "&7The weather has been changed to &e{weather}&7."
  
  # Weather lock messages
  weather-locked: "&7The weather has been &clocked&7. Natural weather changes are now disabled."
  weather-unlocked: "&7The weather has been &aunlocked&7. Natural weather changes are now enabled."
  
  # Error messages
  no-permission: "&cYou do not have permission to use this command."
  invalid-weather: "&cInvalid weather type. Use: clear, rain, or thunder."
  invalid-boolean: "&cInvalid value. Use: true or false."
  player-only: "&cThis command can only be used by players."
  config-reloaded: "&aConfiguration has been reloaded successfully."
  usage-setweather: "&cUsage: /setweather <clear/rain/thunder>"
  usage-weatherlock: "&cUsage: /weatherlock <true/false>"
  usage-lcweather: "&cUsage: /lcweather <reload>"

# ============================================
# Broadcast Settings
# ============================================
broadcast:
  # Should weather changes be broadcast to all players?
  enabled: true
  
  # Message to broadcast (use {weather} for weather type, {player} for player name)
  message: "&7[Server] The weather is now &e{weather}&7!"
